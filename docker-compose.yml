version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: placement-ai-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: placement_ai_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - placement-network

  backend:
    build: ./backend
    container_name: placement-ai-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - spring.datasource.url=jdbc:mysql://mysql:3306/placement_ai_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - JWT_SECRET=mySecretKey12345678901234567890123456789012345678901
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - placement-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: placement-ai-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - placement-network

volumes:
  mysql_data:

networks:
  placement-network:
    driver: bridge
