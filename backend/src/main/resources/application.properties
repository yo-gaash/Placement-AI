spring.application.name=placement-ai-backend
server.port=8080

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/placement_ai_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123456789012345678901}
jwt.expiration=86400000

# Groq AI API
groq.api.key=${GROQ_API_KEY:your-groq-api-key-here}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=${GROQ_API_MODEL:llama-3.3-70b-versatile}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.placementai=DEBUG
logging.level.org.springframework.security=WARN
